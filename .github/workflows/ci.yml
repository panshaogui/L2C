name: L2C Compiler CI/CD

on:
  push:
    branches:
      - main
      - feature/*
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

jobs:
  # ==========================================
  # 🏭 阶段一：全平台矩阵并发编译 (Matrix Build)
  # ==========================================
  build:
    name: Build on ${{ matrix.os }}
    # 🎯 开启矩阵分发：同时拉起 Linux(X64) 和 macOS(Apple Silicon ARM64)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14]

    steps:
    - name: 📥 检出代码 (Checkout)
      uses: actions/checkout@v4

    - name: ⚙️ 安装底层依赖 (Linux 分支)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y lua5.4 liblua5.4-dev luarocks clang gcc make git
        sudo ln -sf /usr/bin/lua5.4 /usr/bin/lua
        sudo luarocks --lua-version=5.4 install argparse
        sudo luarocks --lua-version=5.4 install tl --nodeps
        sudo luarocks --lua-version=5.4 install inspect

    - name: ⚙️ 安装底层依赖 (macOS 分支)
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install lua luarocks
        # 🔥 [精准解绑]：Mac 的 Homebrew 默认就是 5.4，去掉画蛇添足的版本限制！
        luarocks install argparse
        luarocks install tl --nodeps
        luarocks install inspect

    - name: 🧠 编译部署 Nelua 物理降维引擎
      run: |
        git clone https://github.com/edubart/nelua-lang.git /tmp/nelua
        cd /tmp/nelua
        make
        sudo make install

    - name: 🧪 执行 TDD 护城河测试 (全平台并发测试)
      run: |
        echo "🚀 启动 L2C 全自动测试总线..."
        lua test_runner.lua

    - name: 📦 锻造独立二进制本体 (重命名防冲突)
      run: |
        echo "⚡ 执行盗梦空间元编译..."
        lua build_native_l2c.lua
        # 物理重命名：区分平台与架构，例如 l2c_bin_Linux_X64
        mv l2c_bin l2c_bin_${{ runner.os }}_${{ runner.arch }}

    - name: 📤 临时存储 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: l2c-compiler-${{ runner.os }}-${{ runner.arch }}
        path: l2c_bin_${{ runner.os }}_${{ runner.arch }}
        retention-days: 1

  # ==========================================
  # 🚀 阶段二：终极自动发版 (Release)
  # ==========================================
  release:
    name: 🌐 自动推送到 GitHub Releases
    needs: build
    # 🛡️ 只有当你打了形如 v1.0.0 的 tag 时，才会触发这个发版车间
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: 📥 下载所有平台的编译产物
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: 📢 创建 Release 页面并挂载二进制武器
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/l2c_bin_*
        generate_release_notes: true