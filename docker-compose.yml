services:
  # 🚀 1. 静态原生编译炼丹炉 (Musl)
  l2c-compiler:
    container_name: l2c-musl-forge
    image: ghcr.io/panshaogui/l2c-musl-env:latest
    volumes:
      - .:/workspace
    environment:
      - L2C_MUSL_FORGE=1
    entrypoint: /bin/sh
    tty: true
    stdin_open: true

  # 🚀 2. 树莓派 Pico 交叉编译炼丹炉
  l2c-pico-forge:
    container_name: l2c-pico-forge
    image: ghcr.io/panshaogui/l2c-pico-env:latest
    volumes:
      - .:/workspace
    entrypoint: /bin/sh
    tty: true
    stdin_open: true

  l2c-esp32-forge:
    container_name: l2c-esp32-forge
    image: ghcr.io/panshaogui/l2c-esp32-env:latest
    
    # 物理挂载：把当前代码库直连进容器
    volumes:
      - .:/project
      
    # 保持容器处于呼吸状态，随时等待 L2C 命令注入
    entrypoint: /bin/sh
    tty: true
    stdin_open: true
